[workspace]
name = "gatk-variant-calling"
version = "0.1.0"
description = "GATK variant calling workflow - from bash to Nextflow transformation"
channels = ["conda-forge", "bioconda"]
platforms = ["linux-64"]

[dependencies]
nextflow = ">=25.10.4,<26"
nf-test = ">=0.9.4,<0.10"
singularity = ">=3.8.6,<4"
ensembl-vep = ">=115.2,<116"
samtools = ">=1.21,<2"
picard = ">=3.4.0,<4"
bcftools = ">=1.21,<2"
survivor = ">=1.0.7,<2"
cnvnator = ">=0.4.1,<0.5"

[pypi-dependencies]
nf-core = ">=3.5.2, <4"
